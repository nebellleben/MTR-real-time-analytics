version: 2

models:
  - name: dim_lines
    description: "Dimension table for MTR lines"
    columns:
      - name: line_code
        description: "MTR line code"
        tests:
          - not_null
          - unique
      - name: line_name
        description: "Full line name"
        tests:
          - not_null
      - name: line_color
        description: "Hex color code for visualization"
      - name: is_urban
        description: "Whether line serves urban areas"

  - name: dim_stations
    description: "Dimension table for MTR stations"
    columns:
      - name: station_code
        description: "Station code"
        tests:
          - not_null
      - name: line_code
        description: "MTR line code"
        tests:
          - not_null
      - name: is_interchange
        description: "Whether station is an interchange"

  - name: fact_wait_analysis
    description: "Fact table for wait time metrics aggregated by hour and line"
    columns:
      - name: ingestion_date
        description: "Date of the data"
        tests:
          - not_null
      - name: hour
        description: "Hour of day (0-23)"
        tests:
          - not_null
      - name: line_code
        description: "MTR line code"
        tests:
          - not_null
      - name: line_name
        description: "Full line name"
        tests:
          - not_null
      - name: station_code
        description: "Station code"
        tests:
          - not_null
      - name: sample_count
        description: "Number of arrival observations"
        tests:
          - not_null
      - name: avg_wait_seconds
        description: "Average wait time in seconds"
        tests:
          - not_null
      - name: std_wait_seconds
        description: "Standard deviation of wait times"
      - name: min_wait_seconds
        description: "Minimum wait time observed"
      - name: max_wait_seconds
        description: "Maximum wait time observed"
      - name: upper_bound_seconds
        description: "Upper threshold (mean + 2*std)"
      - name: lower_bound_seconds
        description: "Lower threshold (mean - 2*std)"
      - name: wait_category
        description: "Classification: unusually_short, normal, unusually_long"
